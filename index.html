<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WaelVision Player</title>
<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0d0d0d;
    color:white;
}
header{
    background:#111;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    letter-spacing:2px;
    border-bottom:2px solid red;
}
.container{
    padding:20px;
}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
    gap:15px;
}
.card{
    background:#1a1a1a;
    padding:20px;
    text-align:center;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
    border:1px solid #222;
}
.card:hover{
    background:red;
    transform:scale(1.05);
}
audio{
    width:100%;
    margin-top:20px;
}
button{
    background:red;
    border:none;
    padding:10px 20px;
    color:white;
    border-radius:6px;
    cursor:pointer;
}
#adminPanel{
    display:none;
    background:#111;
    padding:20px;
    border-radius:10px;
    margin-top:20px;
}
input{
    padding:8px;
    border:none;
    border-radius:6px;
    margin-bottom:10px;
}
select{
    padding:8px;
    border-radius:6px;
    border:none;
    margin-bottom:10px;
    background:#222;
    color:white;
}
</style>
</head>
<body>

<header>WAELVISION PLAYER</header>

<div class="container">

<h2>Filter Radios</h2>
<input type="text" id="searchInput" placeholder="Search..." onkeyup="filterRadios()">
<select id="categorySelect" onchange="filterRadios()">
    <option value="all">All Categories</option>
    <option value="morocco">Morocco</option>
    <option value="france">France</option>
    <option value="uk">UK</option>
    <option value="arabic">Arabic</option>
    <option value="international">International</option>
</select>

<h2>Live Radios</h2>
<div class="grid" id="radioGrid"></div>

<audio id="player" controls autoplay></audio>

<h2 style="margin-top:40px;">Admin</h2>
<button onclick="openAdmin()">Open Admin</button>

<div id="adminPanel">
    <h3>Admin Login</h3>
    <input type="password" id="pass" placeholder="Enter Password">
    <button onclick="checkPass()">Login</button>
    <div id="adminContent" style="display:none;margin-top:15px;">
        <p>Welcome Admin 👑</p>
        <p>System Status: Active</p>
    </div>
</div>

</div>

<script>
const radios=[
    {name:'Radio Mars', url:'https://radiomaroc.ice.infomaniak.ch/radiomaroc-128.mp3', category:'morocco'},
    {name:'Med Radio', url:'https://medradio-maroc.ice.infomaniak.ch/medradio-maroc.mp3', category:'morocco'},
    {name:'Hit Radio', url:'https://hitradio-maroc.ice.infomaniak.ch/hitradio-maroc.mp3', category:'morocco'},
    {name:'Aswat', url:'https://aswat.ice.infomaniak.ch/aswat-128.mp3', category:'morocco'},
    {name:'Chada FM', url:'https://chadafm.ice.infomaniak.ch/chadafm-128.mp3', category:'morocco'},
    {name:'Atlantic Radio', url:'https://atlanticradio.ice.infomaniak.ch/atlanticradio.mp3', category:'morocco'},
    {name:'Lux Radio', url:'https://luxradio.ice.infomaniak.ch/luxradio-128.mp3', category:'morocco'},
    {name:'MFM Radio', url:'https://mfmradio.ice.infomaniak.ch/mfmradio-128.mp3', category:'france'},
    {name:'Radio 2M', url:'https://radio2m.ice.infomaniak.ch/radio2m-128.mp3', category:'morocco'},
    {name:'Medi1', url:'https://medi1.ice.infomaniak.ch/medi1-128.mp3', category:'morocco'},
    {name:'BBC Radio 1', url:'https://stream.live.vc.bbcmedia.co.uk/bbc_radio_one', category:'uk'},
    {name:'BBC Radio 2', url:'https://stream.live.vc.bbcmedia.co.uk/bbc_radio_two', category:'uk'},
    {name:'BBC World', url:'https://stream.live.vc.bbcmedia.co.uk/bbc_world_service', category:'uk'},
    {name:'NRJ France', url:'https://playerservices.streamtheworld.com/api/livestream-redirect/NRJ_FR.mp3', category:'france'},
    {name:'Fun Radio', url:'https://playerservices.streamtheworld.com/api/livestream-redirect/FUNRADIO_FR.mp3', category:'france'},
    {name:'Skyrock', url:'https://playerservices.streamtheworld.com/api/livestream-redirect/SKYROCK.mp3', category:'france'},
    {name:'Capital FM', url:'https://streaming.radio.co/s95fa8bbdd/listen', category:'international'},
    {name:'Dance Wave', url:'https://usa1-vn.mixstream.net:8136/listen.mp3', category:'international'},
    {name:'Radio NL', url:'https://icecast.omroep.nl/radio1-bb-mp3', category:'international'},
    {name:'FIP', url:'https://icecast.radiofrance.fr/fip-midfi.mp3', category:'france'},
    {name:'KIIS FM', url:'https://live-radio01.mediahubaustralia.com/2TJW/mp3/', category:'international'},
    {name:'Triple M', url:'https://live-radio02.mediahubaustralia.com/2MMM/mp3/', category:'international'},
    {name:'Top 40', url:'https://us4.internet-radio.com/proxy/977music?mp=/stream', category:'international'},
    {name:'80s80s', url:'https://streamingv2.shoutcast.com/80s80s', category:'international'},
    {name:'Arabic Hits', url:'https://stream.zeno.fm/f3wvbbqmdg8uv', category:'arabic'}
];

function renderRadios(list){
    const grid=document.getElementById('radioGrid');
    grid.innerHTML='';
    list.forEach(r=>{
        const div=document.createElement('div');
        div.className='card';
        div.textContent=r.name;
        div.onclick=()=>playRadio(r.url);
        grid.appendChild(div);
    });
    if(list[0]) playRadio(list[0].url);
}

function playRadio(url){
    const player=document.getElementById('player');
    player.src=url;
    player.play();
}

function filterRadios(){
    const search=document.getElementById('searchInput').value.toLowerCase();
    const cat=document.getElementById('categorySelect').value;
    const filtered=radios.filter(r=>{
        const matchName=r.name.toLowerCase().includes(search);
        const matchCat=cat==='all'||r.category===cat;
        return matchName && matchCat;
    });
    renderRadios(filtered);
}

// Initial render
renderRadios(radios);

// Admin
function openAdmin(){
    document.getElementById("adminPanel").style.display="block";
}
function checkPass(){
    var p=document.getElementById("pass").value;
    if(p==="011001"){
        document.getElementById("adminContent").style.display="block";
    }else{
        alert("Wrong Password");
    }
}
</script>

</body>
</html>
